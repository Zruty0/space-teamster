<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    canvas { display: block; }
    #dev-panel {
      display: none;

      top: 10px;
      right: 10px;
      width: 320px;
      max-height: 90vh;
      overflow-y: auto;
      background: rgba(0, 20, 0, 0.9);
      border: 1px solid #0a0;
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 10px;
      z-index: 100;
    }
    #dev-panel h3 { color: #0f0; margin: 8px 0 4px; font-size: 12px; }
    #dev-panel label { display: flex; justify-content: space-between; align-items: center; margin: 2px 0; }
    #dev-panel input[type="range"] { width: 120px; accent-color: #0f0; }
    #dev-panel input[type="checkbox"] { accent-color: #0f0; }
    #dev-panel .val { min-width: 50px; text-align: right; }
    #dev-panel button {
      background: #030; border: 1px solid #0a0; color: #0f0;
      padding: 4px 12px; cursor: pointer; margin-top: 8px; font-family: inherit;
